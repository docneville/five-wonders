<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Five Wonders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="fw.css" />
  <style>
    .place-detail {
      max-width: 640px;
      margin: 32px auto;
      padding: 0 16px 48px;
    }
    .place-detail-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .place-detail-category {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--fw-accent, #3b82f6);
      margin-bottom: 12px;
    }
    .place-detail-address,
    .place-detail-phone,
    .place-detail-website {
      margin-bottom: 6px;
      font-size: 0.95rem;
      color: var(--fw-text-secondary, #555);
    }
    .place-detail-website a {
      color: var(--fw-accent, #3b82f6);
      text-decoration: none;
    }
    .place-detail-website a:hover { text-decoration: underline; }
    .place-detail-notes-header {
      font-weight: 600;
      margin: 18px 0 4px;
    }
    .place-detail-notes {
      white-space: pre-wrap;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--fw-text, #222);
    }
    .place-detail-photos {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0;
    }
    .place-detail-photos img {
      width: 120px;
      height: 90px;
      object-fit: cover;
      border-radius: 6px;
    }
    .place-detail-links {
      margin: 12px 0;
    }
    .place-detail-links a {
      display: inline-block;
      margin-right: 12px;
      margin-bottom: 4px;
      color: var(--fw-accent, #3b82f6);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .place-detail-links a:hover { text-decoration: underline; }
    .place-detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }
    .place-detail-map-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--fw-btn-secondary-bg, #f1f5f9);
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--fw-text, #222);
    }
    .place-detail-map-link:hover { opacity: 0.8; }
    .place-detail-share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--fw-btn-secondary-bg, #f1f5f9);
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--fw-text, #222);
      cursor: pointer;
    }
    .place-detail-share-btn:hover { opacity: 0.8; }
    .place-detail-meta {
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--fw-text-secondary, #888);
    }
    .state-msg {
      max-width: 640px;
      margin: 80px auto;
      padding: 0 16px;
      text-align: center;
      color: var(--fw-text-secondary, #888);
    }
    .state-msg h2 { margin-bottom: 8px; color: var(--fw-text, #222); }
  </style>
</head>
<body>
  <header class="fw-header">
    <a href="index.html" class="fw-header-title">Five Wonders</a>
    <button class="fw-hamburger" id="hamburgerBtn" aria-label="Menu" aria-expanded="false">
      <div class="fw-hamburger-icon"><span></span><span></span><span></span></div>
    </button>
    <nav class="fw-header-nav" id="headerNav">
      <a href="index.html">Home</a>
      <a href="add-place.html">Add</a>
      <a href="edit-places.html">Edit</a>
      <a href="view.html">View</a>
      <a href="lists.html">Lists</a>
      <a href="about.html">About</a>
      <a href="faq.html">FAQ</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <div id="state-loading" class="state-msg">
    <p>Loading…</p>
  </div>

  <div id="state-private" class="state-msg" style="display:none;">
    <h2>This place is private</h2>
    <p>The owner has not made this place available for sharing.</p>
  </div>

  <div id="state-notfound" class="state-msg" style="display:none;">
    <h2>Place not found</h2>
    <p>This link may be invalid or the place may have been removed.</p>
  </div>

  <div id="place-detail" class="place-detail" style="display:none;"></div>

  <script type="module">
    const SUPABASE_URL = "https://ekpssonwtztubqfihlqm.supabase.co";
    const MANAGE_PLACES_URL = `${SUPABASE_URL}/functions/v1/manage-places`;
    const STORAGE_URL = `${SUPABASE_URL}/storage/v1/object/public/place-photos`;

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function show(id) {
      ["state-loading","state-private","state-notfound","place-detail"]
        .forEach(el => document.getElementById(el).style.display = el === id ? "" : "none");
    }

    function buildAddress(p) {
      const parts = [p.street_line1, p.city, p.state, p.country].filter(Boolean);
      return parts.join(", ");
    }

    function buildPhotosHtml(photos) {
      if (!Array.isArray(photos) || photos.length === 0) return "";
      const imgs = photos.map(ph => {
        const src = `${STORAGE_URL}/${ph.thumbnail_path || ph.storage_path}`;
        return `<img src="${src}" alt="${escapeHtml(ph.description)}" loading="lazy" />`;
      }).join("");
      return `<div class="place-detail-photos">${imgs}</div>`;
    }

    function buildLinksHtml(links) {
      if (!Array.isArray(links) || links.length === 0) return "";
      const anchors = links.map(l =>
        `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.text || l.url)}</a>`
      ).join("");
      return `<div class="place-detail-links">${anchors}</div>`;
    }

    const params = new URLSearchParams(window.location.search);
    const placeId = params.get("id");

    if (!placeId) {
      show("state-notfound");
    } else {
      const res = await fetch(MANAGE_PLACES_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "get_public", user_token: "public", place_id: placeId }),
      });

      const json = await res.json().catch(() => ({}));

      if (json.error === "private") {
        show("state-private");
      } else if (!res.ok || !json.place) {
        show("state-notfound");
      } else {
        const p = json.place;
        document.title = `${p.title || "Place"} — Five Wonders`;

        const address = buildAddress(p);
        const savedBy = [p.first_name, p.last_name].filter(Boolean).join(" ") || p.username || "";
        const createdAt = p.created_at ? new Date(p.created_at).toLocaleDateString() : "";

        const mapHref = p.latitude && p.longitude
          ? `https://www.google.com/maps/search/?api=1&query=${p.latitude},${p.longitude}`
          : address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}` : "";

        const shareUrl = window.location.href;

        document.getElementById("place-detail").innerHTML = `
          <div class="place-detail-title">${escapeHtml(p.title)}</div>
          ${p.category ? `<div class="place-detail-category">${escapeHtml(p.category)}</div>` : ""}
          ${address ? `<div class="place-detail-address">${escapeHtml(address)}</div>` : ""}
          ${p.phone ? `<div class="place-detail-phone">📞 ${escapeHtml(p.phone)}</div>` : ""}
          ${p.website ? `<div class="place-detail-website"><a href="${escapeHtml(p.website)}" target="_blank" rel="noopener">${escapeHtml(p.website)}</a></div>` : ""}
          ${buildLinksHtml(p.links)}
          ${buildPhotosHtml(p.photos)}
          ${p.notes ? `<div class="place-detail-notes-header">Why ${escapeHtml(p.title)} is a Wonder:</div><div class="place-detail-notes">${escapeHtml(p.notes)}</div>` : ""}
          <div class="place-detail-actions">
            ${mapHref ? `<a href="${mapHref}" target="_blank" rel="noopener" class="place-detail-map-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
              Open in Maps
            </a>` : ""}
            <button class="place-detail-share-btn" id="shareBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Copy link
            </button>
          </div>
          <div class="place-detail-meta">
            ${createdAt ? `Saved ${createdAt}` : ""}${savedBy ? ` by ${escapeHtml(savedBy)}` : ""}
          </div>
        `;

        show("place-detail");

        document.getElementById("shareBtn").addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(shareUrl);
            const btn = document.getElementById("shareBtn");
            btn.textContent = "✓ Copied!";
            setTimeout(() => { btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Copy link`; }, 2000);
          } catch {
            prompt("Copy this link:", shareUrl);
          }
        });
      }
    }

    // Hamburger menu
    const hamburgerBtn = document.getElementById("hamburgerBtn");
    const headerNav = document.getElementById("headerNav");
    hamburgerBtn?.addEventListener("click", () => {
      const isOpen = headerNav.classList.toggle("open");
      hamburgerBtn.classList.toggle("open", isOpen);
      hamburgerBtn.setAttribute("aria-expanded", isOpen);
    });
    headerNav?.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", () => {
        headerNav.classList.remove("open");
        hamburgerBtn.classList.remove("open");
        hamburgerBtn.setAttribute("aria-expanded", "false");
      });
    });
    document.addEventListener("click", (e) => {
      if (!hamburgerBtn?.contains(e.target) && !headerNav?.contains(e.target)) {
        headerNav?.classList.remove("open");
        hamburgerBtn?.classList.remove("open");
        hamburgerBtn?.setAttribute("aria-expanded", "false");
      }
    });
  </script>
</body>
</html>
