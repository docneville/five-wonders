<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Five Wonders Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Shared styles -->
  <link rel="stylesheet" href="fw.css" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <!-- Leaflet MarkerCluster CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />
  <style>
    /* Custom cluster styles */
    .marker-cluster-small {
      background-color: rgba(34, 197, 94, 0.6);
    }
    .marker-cluster-small div {
      background-color: rgba(34, 197, 94, 0.8);
    }
    .marker-cluster-medium {
      background-color: rgba(251, 191, 36, 0.6);
    }
    .marker-cluster-medium div {
      background-color: rgba(251, 191, 36, 0.8);
    }
    .marker-cluster-large {
      background-color: rgba(239, 68, 68, 0.6);
    }
    .marker-cluster-large div {
      background-color: rgba(239, 68, 68, 0.8);
    }
    .marker-cluster {
      background-clip: padding-box;
      border-radius: 50%;
    }
    .marker-cluster div {
      width: 30px;
      height: 30px;
      margin-left: 5px;
      margin-top: 5px;
      text-align: center;
      border-radius: 50%;
      font: 12px "Helvetica Neue", Arial, Helvetica, sans-serif;
      color: #fff;
      font-weight: 700;
      line-height: 30px;
    }
    .marker-cluster span {
      line-height: 30px;
    }
  </style>
</head>

<body>
  <header class="fw-header">
    <a href="index.html" class="fw-header-title">Five Wonders</a>
    <button class="fw-hamburger" id="hamburgerBtn" aria-label="Menu" aria-expanded="false">
      <div class="fw-hamburger-icon">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </button>
    <nav class="fw-header-nav" id="headerNav" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="add-place.html">Add</a>
      <a href="edit-places.html">Edit</a>
      <a href="view.html">View</a>
      <a href="about.html">About</a>
      <a href="faq.html">FAQ</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <!-- Filter bar -->
  <div id="filterBar" class="fw-filter-bar">
    <button id="filterToggle" class="fw-filter-toggle" type="button" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      <span>Filters</span>
      <span id="filterCount" class="fw-filter-count" style="display: none;">0</span>
    </button>
    <div id="filterChips" class="fw-filter-chips" style="display: none;">
      <button class="fw-filter-chip" data-filter="mine" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        My Wonders
      </button>
      <button class="fw-filter-chip" data-filter="Dining" type="button">Dining</button>
      <button class="fw-filter-chip" data-filter="Lodging" type="button">Lodging</button>
      <button class="fw-filter-chip" data-filter="Attraction" type="button">Attraction</button>
      <button class="fw-filter-chip" data-filter="Recreation" type="button">Recreation</button>
      <button class="fw-filter-chip" data-filter="Shopping" type="button">Shopping</button>
      <button class="fw-filter-chip" data-filter="Other" type="button">Other</button>
      <button id="clearFilters" class="fw-filter-clear" type="button" style="display: none;">Clear all</button>
    </div>
  </div>

  <!-- Map fills the screen under the header -->
  <div id="map" class="fw-map-fullscreen"></div>

  <!-- Lightbox for full-screen photo viewing -->
  <div id="lightbox" class="lightbox lightbox--hidden" aria-hidden="true">
    <button class="lightbox-close" type="button" aria-label="Close">&times;</button>
    <button class="lightbox-prev" type="button" aria-label="Previous">&lsaquo;</button>
    <button class="lightbox-next" type="button" aria-label="Next">&rsaquo;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="" />
    </div>
    <div class="lightbox-footer">
      <div id="lightbox-caption" class="lightbox-caption"></div>
      <div id="lightbox-counter" class="lightbox-counter"></div>
    </div>
  </div>

  <!-- Mobile place sheet -->
  <section
    id="placeSheet"
    class="fw-sheet fw-sheet--view fw-sheet--hidden"
    aria-hidden="true"
  >
    <div class="fw-sheet-handle" id="placeSheetHandle"></div>
    <div class="ps-header">
      <button class="ps-share-btn" id="placeSheetShareBtn" aria-label="Share this place">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      </button>
      <div class="ps-header-text">
        <div class="ps-title" id="placeSheetTitle">Place</div>
        <div class="ps-subtitle" id="placeSheetSubtitle"></div>
      </div>
      <button class="ps-close-btn" id="closePlaceSheetBtn" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="fw-sheet-content" id="placeSheetContent"></div>
  </section>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <!-- Leaflet MarkerCluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- App script -->
  <script type="module">
    const SUPABASE_URL = "https://ekpssonwtztubqfihlqm.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrcHNzb253dHp0dWJxZmlobHFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM1Njg2MjAsImV4cCI6MjA3OTE0NDYyMH0.R1_-ctf-6NsVUJEApf4N591lA9TPRCJQFzhrDVRbr_4";

    if (!window.supabase) {
      console.error("Supabase library failed to load");
    }
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Get current user's profile ID from localStorage
    const LS_ID = "fw_profile_id";
    const LS_ID_LEGACY = "profile_id";
    const currentUserId = localStorage.getItem(LS_ID) || localStorage.getItem(LS_ID_LEGACY);

    // ===== Filter state =====
    let allPlacesData = []; // Store all places for filtering
    const activeFilters = new Set(); // Active filter values

    // Check URL for filter parameters
    const urlParams = new URLSearchParams(window.location.search);
    const urlFilters = urlParams.get('filter');
    if (urlFilters) {
      urlFilters.split(',').forEach(f => activeFilters.add(f.trim()));
    }

    // Filter UI elements
    const filterToggle = document.getElementById('filterToggle');
    const filterChips = document.getElementById('filterChips');
    const filterCount = document.getElementById('filterCount');
    const clearFiltersBtn = document.getElementById('clearFilters');
    const chipButtons = document.querySelectorAll('.fw-filter-chip');

    // State variables (declared early to avoid temporal dead zone)
    let placesDataMap = new Map();
    let placesLoaded = false;
    let waitingForGeolocation = true;
    let hasZoomedToUser = false;

    // Initialize the Leaflet map
    const map = L.map("map", { zoomControl: true });

    // Base map layer (OpenStreetMap)
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors",
    }).addTo(map);

    // Default view until we have data
    map.setView([39.5, -98.35], 4);

    // ===== Mobile sheet helpers =====
    const mqMobile = window.matchMedia("(max-width: 768px)");
    const placeSheet = document.getElementById("placeSheet");
    const placeSheetContent = document.getElementById("placeSheetContent");
    const placeSheetTitleEl = document.getElementById("placeSheetTitle");
    const placeSheetSubtitleEl = document.getElementById("placeSheetSubtitle");
    const placeSheetShareBtn = document.getElementById("placeSheetShareBtn");
    const closePlaceSheetBtn = document.getElementById("closePlaceSheetBtn");
    const placeSheetHandle = document.getElementById("placeSheetHandle");

    // States: hidden → peek → half (default open) → full
    const SHEET_STATES = ["fw-sheet--hidden", "fw-sheet--peek", "fw-sheet--half", "fw-sheet--full"];

    function setSheetState(state) {
      if (!placeSheet) return;
      placeSheet.classList.remove(...SHEET_STATES);
      placeSheet.classList.add(state);
      placeSheet.setAttribute("aria-hidden", state === "fw-sheet--hidden" ? "true" : "false");
    }

    function openPlaceSheet(mode = "half") {
      setSheetState(mode === "open" || mode === "half" ? "fw-sheet--half" : mode === "full" ? "fw-sheet--full" : "fw-sheet--peek");
    }

    function closePlaceSheet() {
      setSheetState("fw-sheet--hidden");
      currentSheetPlace = null;
    }

    // Swipe gesture on sheet
    let sheetTouchStartY = 0;
    placeSheet?.addEventListener("touchstart", (e) => {
      sheetTouchStartY = e.touches[0].clientY;
    }, { passive: true });

    placeSheet?.addEventListener("touchend", (e) => {
      const delta = sheetTouchStartY - e.changedTouches[0].clientY;
      const threshold = 40;
      if (Math.abs(delta) < threshold) return;

      const cur = SHEET_STATES.find(s => placeSheet.classList.contains(s)) || "fw-sheet--half";
      const idx = SHEET_STATES.indexOf(cur);

      if (delta > 0) {
        // Swipe up — expand
        if (idx < SHEET_STATES.length - 1) setSheetState(SHEET_STATES[idx + 1]);
      } else {
        // Swipe down — collapse
        if (idx > 0) setSheetState(SHEET_STATES[idx - 1]);
      }
    }, { passive: true });

    placeSheetHandle?.addEventListener("click", () => {
      const cur = SHEET_STATES.find(s => placeSheet.classList.contains(s)) || "fw-sheet--half";
      const idx = SHEET_STATES.indexOf(cur);
      // Toggle between half and full on tap
      if (cur === "fw-sheet--full") setSheetState("fw-sheet--half");
      else if (cur === "fw-sheet--half") setSheetState("fw-sheet--full");
      else setSheetState("fw-sheet--half");
    });

    closePlaceSheetBtn?.addEventListener("click", closePlaceSheet);

    // Shared share handler — works from both sheet button and popup button
    let currentSheetPlace = null;
    async function handleShareClick() {
      if (!currentSheetPlace) return;
      if (currentSheetPlace.isPrivate) {
        placeSheetSubtitleEl.textContent = "This place is private and cannot be shared.";
        setTimeout(() => { placeSheetSubtitleEl.textContent = currentSheetPlace.category || ""; }, 3000);
        return;
      }
      // Use the Edge Function URL so link previews in iMessage/WhatsApp get rich OG tags
      const url = `https://ekpssonwtztubqfihlqm.supabase.co/functions/v1/share-place?id=${currentSheetPlace.placeId}`;
      try { await navigator.clipboard.writeText(url); }
      catch { const i = document.createElement("input"); i.value = url; document.body.appendChild(i); i.select(); document.execCommand("copy"); document.body.removeChild(i); }
      const orig = placeSheetSubtitleEl.textContent;
      placeSheetSubtitleEl.textContent = "Link copied!";
      setTimeout(() => { placeSheetSubtitleEl.textContent = orig; }, 2500);
    }
    placeSheetShareBtn?.addEventListener("click", handleShareClick);

    mqMobile.addEventListener("change", (e) => {
      if (!e.matches) closePlaceSheet();
    });

    function isMobile() {
      return mqMobile.matches;
    }

    // ===== Category icons as SVG =====
    const categoryIcons = {
      Dining: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>`,
      Lodging: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 012 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>`,
      Attraction: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
      Recreation: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-7l-2-2"/><path d="M17 8v.8A6 6 0 0113.5 20v0a6 6 0 01-6.5-6V8a3 3 0 116 0v4.5a1 1 0 01-1 1H11"/><path d="M12 2v4"/></svg>`,
      Shopping: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>`,
      Other: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
    };

    function makeCategoryIcon(category) {
      const cat = category || "Other";
      const icon = categoryIcons[cat] || categoryIcons.Other;
      const className = `fw-category-pin fw-category-pin--${cat.toLowerCase()}`;
      return L.divIcon({
        className: "",
        html: `<div class="${className}">${icon}</div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 28],
        popupAnchor: [0, -28],
      });
    }

    // Keep color function for backwards compatibility
    const userColorCache = new Map();

    function colorForUser(key) {
      const k = String(key || "unknown");
      if (userColorCache.has(k)) return userColorCache.get(k);

      let hash = 0;
      for (let i = 0; i < k.length; i++) {
        hash = k.charCodeAt(i) + ((hash << 5) - hash);
        hash |= 0;
      }

      const hue = Math.abs(hash) % 360;
      const color = `hsl(${hue}, 70%, 45%)`;
      userColorCache.set(k, color);
      return color;
    }

    // Create marker cluster group and add to map
    const markerClusterGroup = L.markerClusterGroup({
      showCoverageOnHover: false,
      maxClusterRadius: 50,
      spiderfyOnMaxZoom: true,
      disableClusteringAtZoom: 16
    });
    map.addLayer(markerClusterGroup);

    // Build readable address from parts
    function buildAddress({ street_line1, city, state, country }) {
      const parts = [];
      if (street_line1) parts.push(street_line1);

      // Combine city and state with comma
      const cityState = [city, state].filter(Boolean).join(", ");
      if (cityState) parts.push(cityState);

      if (country) parts.push(country);

      return parts.join(", ");
    }

    // Supabase storage URL for photos
    const STORAGE_URL = `${SUPABASE_URL}/storage/v1/object/public/place-photos`;

    function getPhotoUrl(storagePath) {
      if (!storagePath) return "";
      return `${STORAGE_URL}/${storagePath}`;
    }

    // Build links HTML
    function buildLinksHtml(links) {
      if (!links || !Array.isArray(links) || links.length === 0) return "";

      const linksItems = links.map(link => {
        const url = escapeHtml(link.url || "");
        const text = escapeHtml(link.text || link.url || "Link");
        const description = link.description ? `<div class="place-link-desc">${escapeHtml(link.description)}</div>` : "";
        return `
          <a href="${url}" target="_blank" rel="noopener" class="place-link">
            <div class="place-link-text">${text}</div>
            ${description}
          </a>
        `;
      }).join("");

      return `
        <div class="place-links-header">Useful Links</div>
        <div class="place-links">${linksItems}</div>
      `;
    }

    // Build photos HTML for thumbnails
    function buildPhotosHtml(photos, placeId) {
      if (!photos || !Array.isArray(photos) || photos.length === 0) return "";

      const photoItems = photos.map((photo, index) => {
        const thumbUrl = photo.thumbnail_path
          ? getPhotoUrl(photo.thumbnail_path)
          : getPhotoUrl(photo.storage_path);
        const desc = escapeHtml(photo.description || "");
        return `
          <div class="place-photo-thumb" data-place-id="${placeId}" data-photo-index="${index}">
            <img src="${thumbUrl}" alt="${desc}" loading="lazy" />
          </div>
        `;
      }).join("");

      return `<div class="place-photos">${photoItems}</div>`;
    }

    // Build map links HTML (opens location, not directions)
    function buildMapLinksHtml(lat, lon) {
      if (typeof lat !== "number" || typeof lon !== "number") return "";
      const appleMapsUrl = `https://maps.apple.com/?ll=${lat},${lon}&q=${lat},${lon}`;
      const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
      return `
        <div class="place-map-links">
          <a href="${appleMapsUrl}" target="_blank" rel="noopener" class="place-map-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            Apple Maps
          </a>
          <a href="${googleMapsUrl}" target="_blank" rel="noopener" class="place-map-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Google Maps
          </a>
        </div>
      `;
    }

    // SVG icons for action buttons
    const SVG = {
      directions: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>`,
      call: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>`,
      website: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`,
      edit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
      address: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
      phone: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>`,
      link: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>`,
      share: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>`,
    };

    function buildMapsUrl(latitude, longitude, address) {
      if (latitude && longitude) return `https://maps.apple.com/?ll=${latitude},${longitude}&q=${encodeURIComponent(address || '')}`;
      if (address) return `https://maps.apple.com/?q=${encodeURIComponent(address)}`;
      return "";
    }

    function buildGoogleMapsUrl(latitude, longitude, address) {
      if (latitude && longitude) return `https://www.google.com/maps/search/?api=1&query=${latitude},${longitude}`;
      if (address) return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
      return "";
    }

    // Shared body content — used in both popup and sheet
    function buildPlaceContentHtml({ title, notes, savedBy, createdAt, category, street_line1, city, state, country, phone, website, links, photos, placeId, latitude, longitude, userId, isPrivate }) {
      const address = buildAddress({ street_line1, city, state, country });
      const isOwner = currentUserId && userId && currentUserId === userId;
      const appleMapsUrl = buildMapsUrl(latitude, longitude, address);
      const googleMapsUrl = buildGoogleMapsUrl(latitude, longitude, address);

      // Action buttons row
      const actionBtns = [
        appleMapsUrl ? `<a href="${appleMapsUrl}" target="_blank" rel="noopener" class="place-action-btn place-action-btn--primary">${SVG.directions}<span>Apple Maps</span></a>` : "",
        googleMapsUrl ? `<a href="${googleMapsUrl}" target="_blank" rel="noopener" class="place-action-btn place-action-btn--primary">${SVG.directions}<span>Google Maps</span></a>` : "",
        phone ? `<a href="tel:${escapeHtml(phone)}" class="place-action-btn place-action-btn--secondary">${SVG.call}<span>Call</span></a>` : "",
        website ? `<a href="${escapeHtml(website)}" target="_blank" rel="noopener" class="place-action-btn place-action-btn--secondary">${SVG.website}<span>Website</span></a>` : "",
        isOwner ? `<a href="edit-places.html?place=${placeId}" class="place-action-btn place-action-btn--secondary">${SVG.edit}<span>Edit</span></a>` : "",
      ].filter(Boolean).join("");

      // Info rows
      const infoRows = [
        address ? `<div class="place-info-row"><div class="place-info-icon">${SVG.address}</div><div class="place-info-text">${escapeHtml(address)}</div></div>` : "",
        phone ? `<div class="place-info-row"><div class="place-info-icon">${SVG.phone}</div><div class="place-info-text"><a href="tel:${escapeHtml(phone)}" class="place-info-link">${escapeHtml(phone)}</a></div></div>` : "",
        website ? `<div class="place-info-row"><div class="place-info-icon">${SVG.website}</div><div class="place-info-text"><a href="${escapeHtml(website)}" target="_blank" rel="noopener" class="place-info-link">${escapeHtml(website)}</a></div></div>` : "",
      ].filter(Boolean).join("");

      // Links rows
      const linkRows = (Array.isArray(links) && links.length > 0)
        ? links.map(l => `<div class="place-info-row"><div class="place-info-icon">${SVG.link}</div><div class="place-info-text"><a href="${escapeHtml(l.url)}" target="_blank" rel="noopener" class="place-info-link">${escapeHtml(l.text || l.url)}</a>${l.description ? `<div class="place-info-sub">${escapeHtml(l.description)}</div>` : ""}</div></div>`).join("")
        : "";

      // Photo strip
      const photoStrip = (Array.isArray(photos) && photos.length > 0)
        ? `<div class="place-photo-strip">${photos.map((ph, i) => `<div class="place-photo-strip-thumb" data-place-id="${placeId}" data-photo-index="${i}"><img src="${getPhotoUrl(ph.thumbnail_path || ph.storage_path)}" alt="${escapeHtml(ph.description || '')}" loading="lazy"/></div>`).join("")}</div>`
        : "";

      // Notes
      const notesHtml = notes
        ? `<div class="place-notes-section"><h4>Why it's a Wonder</h4><div class="place-notes-body">${escapeHtml(notes)}</div></div>`
        : "";

      // Meta
      const metaParts = [
        savedBy ? `Saved by ${escapeHtml(savedBy)}` : "",
        createdAt ? escapeHtml(createdAt) : "",
      ].filter(Boolean);
      const metaHtml = metaParts.length ? `<div class="place-meta-row">${metaParts.join(" · ")}</div>` : "";

      return `
        <div class="place-action-row">${actionBtns}</div>
        ${(infoRows || linkRows) ? `<div class="place-info-section">${infoRows}${linkRows}</div>` : ""}
        ${photoStrip}
        ${notesHtml}
        ${metaHtml}
        <div style="height:32px;"></div>
      `;
    }

    // Desktop popup card (includes title + category in body)
    function buildPopupHtml(placeData) {
      const { title, category, placeId, isPrivate } = placeData;
      return `
        <div class="place-popup-card">
          <div class="place-popup-header">
            <div>
              <div class="place-popup-title">${escapeHtml(title)}</div>
              ${category ? `<div class="place-popup-subtitle">${escapeHtml(category)}</div>` : ""}
            </div>
            <button class="place-share-btn ps-share-btn--popup" data-place-id="${placeId}" data-is-private="${isPrivate}" aria-label="Share">${SVG.share}</button>
          </div>
          ${buildPlaceContentHtml(placeData)}
        </div>
      `;
    }

    // Mobile sheet body (title lives in sheet header)
    function buildPlaceBodyHtml(placeData) {
      return buildPlaceContentHtml(placeData);
    }

    function makeDotIcon(color) {
      return L.divIcon({
        className: "",
        html: `<div class="fw-dot" style="background:${color};"></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        popupAnchor: [0, -10],
      });
    }

    // ===== Filter Functions =====
    function updateFilterUI() {
      // Update chip active states
      chipButtons.forEach(chip => {
        const filterValue = chip.dataset.filter;
        chip.classList.toggle('active', activeFilters.has(filterValue));
      });

      // Update filter count badge
      const count = activeFilters.size;
      if (filterCount) {
        filterCount.textContent = count;
        filterCount.style.display = count > 0 ? 'inline-flex' : 'none';
      }

      // Show/hide clear button
      if (clearFiltersBtn) {
        clearFiltersBtn.style.display = count > 0 ? 'inline-flex' : 'none';
      }

      // Update URL with current filters
      const url = new URL(window.location);
      if (count > 0) {
        url.searchParams.set('filter', Array.from(activeFilters).join(','));
      } else {
        url.searchParams.delete('filter');
      }
      window.history.replaceState({}, '', url);
    }

    function toggleFilter(filterValue) {
      if (activeFilters.has(filterValue)) {
        activeFilters.delete(filterValue);
      } else {
        activeFilters.add(filterValue);
      }
      updateFilterUI();
      renderFilteredMarkers();
    }

    function clearAllFilters() {
      activeFilters.clear();
      updateFilterUI();
      renderFilteredMarkers();
    }

    function getFilteredPlaces() {
      if (activeFilters.size === 0) {
        return allPlacesData;
      }

      return allPlacesData.filter(place => {
        // Check "mine" filter
        if (activeFilters.has('mine')) {
          if (place.userId === currentUserId) return true;
        }

        // Check category filters
        const categoryFilters = Array.from(activeFilters).filter(f => f !== 'mine');
        if (categoryFilters.length > 0) {
          const placeCategory = place.category || 'Other';
          if (categoryFilters.includes(placeCategory)) return true;
        }

        // If only category filters active (no "mine"), check just category
        if (!activeFilters.has('mine') && categoryFilters.length > 0) {
          return false;
        }

        // If only "mine" filter, already handled above
        if (activeFilters.has('mine') && categoryFilters.length === 0) {
          return place.userId === currentUserId;
        }

        return false;
      });
    }

    function renderFilteredMarkers() {
      const filteredPlaces = getFilteredPlaces();
      const bounds = L.latLngBounds([]);

      // Clear existing markers
      markerClusterGroup.clearLayers();

      filteredPlaces.forEach((placeData) => {
        const { title, latitude: lat, longitude: lon, category } = placeData;

        const popupHtml = buildPopupHtml(placeData);
        const bodyHtml = buildPlaceBodyHtml(placeData);
        const icon = makeCategoryIcon(category);
        const marker = L.marker([lat, lon], { icon });

        if (isMobile()) {
          marker.on("click", () => {
            currentSheetPlace = placeData;
            placeSheetTitleEl.textContent = title;
            placeSheetSubtitleEl.textContent = category || "";
            placeSheetContent.innerHTML = bodyHtml;
            openPlaceSheet("half");
          });
        } else {
          marker.bindPopup(buildPopupHtml(placeData), { maxWidth: 340 });
          marker.on("popupopen", () => {
            marker.getPopup().getElement()?.querySelector(".ps-share-btn--popup")?.addEventListener("click", async () => {
              currentSheetPlace = placeData;
              await handleShareClick();
            });
          });
        }

        markerClusterGroup.addLayer(marker);
        bounds.extend([lat, lon]);
      });

      // Only fit bounds when explicitly filtering (not on initial load)
      // Initial load zoom is handled by user location or loadPlaces
      if (bounds.isValid() && activeFilters.size > 0) {
        map.fitBounds(bounds.pad(0.1));
      }
    }

    async function loadPlaces() {
      const { data, error } = await supabase
        .from("places_with_profiles")
        .select(
          `
          id,
          user_id,
          title,
          raw_text,
          notes,
          latitude,
          longitude,
          created_at,
          first_name,
          last_name,
          username,
          category,
          street_line1,
          city,
          state,
          country,
          phone,
          website,
          links,
          photos,
          is_private
        `
        )
        .not("latitude", "is", null)
        .not("longitude", "is", null)
        .order("created_at", { ascending: false });

      if (error) {
        console.error("Error loading places_with_profiles:", error);
        // Don't alert for anon users — they may lack RLS permission, which is expected.
        if (currentUserId) {
          alert("Error loading places – check console/logs.");
        }
        return;
      }

      if (!data || data.length === 0) {
        console.log("No places with coordinates yet.");
        return;
      }

      // Process and store all places data
      allPlacesData = [];
      placesDataMap.clear();

      data.forEach((place) => {
        const lat = place.latitude;
        const lon = place.longitude;
        if (typeof lat !== "number" || typeof lon !== "number") return;

        const title = place.title || "(Untitled place)";
        const notes = place.notes || "";
        const createdAt = place.created_at
          ? new Date(place.created_at).toLocaleString()
          : "";

        const savedBy =
          place.first_name ||
          place.username ||
          (place.last_name ? `Friend (${place.last_name})` : "Someone");

        // Additional fields
        const category = place.category || "";
        const street_line1 = place.street_line1 || "";
        const city = place.city || "";
        const state = place.state || "";
        const country = place.country || "";
        const phone = place.phone || "";
        const website = place.website || "";
        const links = place.links || [];
        const photos = place.photos || [];

        const placeData = {
          title,
          notes,
          createdAt,
          savedBy,
          category,
          street_line1,
          city,
          state,
          country,
          phone,
          website,
          links,
          photos,
          placeId: place.id,
          latitude: lat,
          longitude: lon,
          userId: place.user_id,
          isPrivate: place.is_private ?? false,
        };

        allPlacesData.push(placeData);
        placesDataMap.set(place.id, placeData);
      });

      // Apply filters from URL and render
      updateFilterUI();
      renderFilteredMarkers();

      // Mark that places are loaded (for geolocation fallback)
      placesLoaded = true;

      // If user location already set the view, don't override it
      // Otherwise wait briefly for geolocation, then fall back to all places
      if (!hasZoomedToUser && !waitingForGeolocation) {
        fitToAllPlaces();
      }
    }

    function fitToAllPlaces() {
      if (allPlacesData.length === 0) return;
      const bounds = L.latLngBounds(allPlacesData.map(p => [p.latitude, p.longitude]));
      if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.1));
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // ===== Lightbox functionality =====
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const lightboxCaption = document.getElementById("lightbox-caption");
    const lightboxCounter = document.getElementById("lightbox-counter");
    const lightboxClose = lightbox?.querySelector(".lightbox-close");
    const lightboxPrev = lightbox?.querySelector(".lightbox-prev");
    const lightboxNext = lightbox?.querySelector(".lightbox-next");

    let lightboxPhotos = [];
    let lightboxIndex = 0;

    function openLightbox(photos, startIndex = 0) {
      if (!photos || photos.length === 0) return;

      lightboxPhotos = photos;
      lightboxIndex = startIndex;
      updateLightboxImage();

      lightbox?.classList.remove("lightbox--hidden");
      lightbox?.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox?.classList.add("lightbox--hidden");
      lightbox?.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function updateLightboxImage() {
      const photo = lightboxPhotos[lightboxIndex];
      if (!photo) return;

      const fullUrl = getPhotoUrl(photo.storage_path);
      lightboxImg.src = fullUrl;
      lightboxImg.alt = photo.description || "";
      lightboxCaption.textContent = photo.description || "";
      lightboxCounter.textContent = `${lightboxIndex + 1} / ${lightboxPhotos.length}`;

      // Show/hide nav buttons based on photo count
      if (lightboxPrev) lightboxPrev.style.display = lightboxPhotos.length > 1 ? "flex" : "none";
      if (lightboxNext) lightboxNext.style.display = lightboxPhotos.length > 1 ? "flex" : "none";
    }

    function lightboxPrevPhoto() {
      lightboxIndex = (lightboxIndex - 1 + lightboxPhotos.length) % lightboxPhotos.length;
      updateLightboxImage();
    }

    function lightboxNextPhoto() {
      lightboxIndex = (lightboxIndex + 1) % lightboxPhotos.length;
      updateLightboxImage();
    }

    // Lightbox event listeners
    lightboxClose?.addEventListener("click", closeLightbox);
    lightboxPrev?.addEventListener("click", lightboxPrevPhoto);
    lightboxNext?.addEventListener("click", lightboxNextPhoto);

    // Close on background click
    lightbox?.addEventListener("click", (e) => {
      if (e.target === lightbox || e.target.classList.contains("lightbox-content")) {
        closeLightbox();
      }
    });

    // Keyboard navigation
    document.addEventListener("keydown", (e) => {
      if (lightbox?.classList.contains("lightbox--hidden")) return;

      switch (e.key) {
        case "Escape":
          closeLightbox();
          break;
        case "ArrowLeft":
          lightboxPrevPhoto();
          break;
        case "ArrowRight":
          lightboxNextPhoto();
          break;
      }
    });

    // Touch swipe support for mobile
    let touchStartX = 0;
    let touchEndX = 0;

    lightbox?.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    lightbox?.addEventListener("touchend", (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, { passive: true });

    function handleSwipe() {
      const swipeThreshold = 50;
      const diff = touchStartX - touchEndX;

      if (Math.abs(diff) > swipeThreshold) {
        if (diff > 0) {
          lightboxNextPhoto(); // Swipe left = next
        } else {
          lightboxPrevPhoto(); // Swipe right = prev
        }
      }
    }

    // Handle photo thumbnail clicks (delegated — covers both old .place-photo-thumb and new .place-photo-strip-thumb)
    function setupPhotoClickHandlers() {
      document.addEventListener("click", (e) => {
        const thumb = e.target.closest(".place-photo-thumb, .place-photo-strip-thumb");
        if (!thumb) return;

        const placeId = thumb.dataset.placeId;
        const photoIndex = parseInt(thumb.dataset.photoIndex, 10) || 0;

        // Try the map first; fall back to currentSheetPlace (for get_public / shared links)
        const placeData = placesDataMap.get(placeId) ?? (currentSheetPlace?.placeId === placeId ? currentSheetPlace : null);

        if (placeData && placeData.photos) {
          openLightbox(placeData.photos, photoIndex);
        }
      });
    }

    setupPhotoClickHandlers();

    // Share button handler (delegated — buttons are inside dynamic popup/sheet HTML)
    document.addEventListener("click", async (e) => {
      const btn = e.target.closest(".place-share-btn");
      if (!btn) return;

      const placeId = btn.dataset.placeId;
      const isPrivate = btn.dataset.isPrivate === "true";
      const feedback = document.querySelector(`.place-share-feedback[data-place-id="${placeId}"]`);

      if (isPrivate) {
        if (feedback) { feedback.textContent = "This place is private and cannot be shared."; }
        return;
      }

      const base = window.location.origin + window.location.pathname;
      const url = `${base}?place=${placeId}`;

      try {
        await navigator.clipboard.writeText(url);
      } catch {
        // fallback: construct a temporary input
        const inp = document.createElement("input");
        inp.value = url;
        document.body.appendChild(inp);
        inp.select();
        document.execCommand("copy");
        document.body.removeChild(inp);
      }

      if (feedback) {
        feedback.textContent = "Link copied!";
        setTimeout(() => { feedback.textContent = ""; }, 2500);
      }
    });

    const MANAGE_PLACES_URL = "https://ekpssonwtztubqfihlqm.supabase.co/functions/v1/manage-places";
    const STORAGE_URL_VIEW = "https://ekpssonwtztubqfihlqm.supabase.co/storage/v1/object/public/place-photos";

    // Open a place by ID — used when ?place= param is present.
    // Tries placesDataMap first (already loaded), then falls back to get_public.
    async function openPlaceById(placeId) {
      let placeData = placesDataMap.get(placeId);

      if (!placeData) {
        // Recipient may not be logged in — fetch via get_public
        try {
          const res = await fetch(MANAGE_PLACES_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "get_public", user_token: "public", place_id: placeId }),
          });
          const json = await res.json().catch(() => ({}));
          if (json.error === "private" || !json.place) return;

          const p = json.place;
          if (typeof p.latitude !== "number" || typeof p.longitude !== "number") return;

          const savedBy = p.first_name || p.username || (p.last_name ? `Friend (${p.last_name})` : "Someone");
          placeData = {
            title: p.title || "(Untitled place)",
            notes: p.notes || "",
            createdAt: p.created_at ? new Date(p.created_at).toLocaleString() : "",
            savedBy,
            category: p.category || "",
            street_line1: p.street_line1 || "",
            city: p.city || "",
            state: p.state || "",
            country: p.country || "",
            phone: p.phone || "",
            website: p.website || "",
            links: p.links || [],
            photos: p.photos || [],
            placeId: p.id,
            latitude: p.latitude,
            longitude: p.longitude,
            userId: p.user_id,
          };

          // Add a temporary marker for this place
          const icon = makeCategoryIcon(placeData.category);
          const marker = L.marker([placeData.latitude, placeData.longitude], { icon });
          const popupHtml = buildPopupHtml(placeData);
          const bodyHtml = buildPlaceBodyHtml(placeData);

          if (isMobile()) {
            marker.on("click", () => {
              currentSheetPlace = placeData;
              placeSheetTitleEl.textContent = placeData.title;
              placeSheetSubtitleEl.textContent = placeData.category || "";
              placeSheetContent.innerHTML = buildPlaceBodyHtml(placeData);
              openPlaceSheet("half");
            });
          } else {
            marker.bindPopup(buildPopupHtml(placeData), { maxWidth: 340 });
            marker.on("popupopen", () => {
              marker.getPopup().getElement()?.querySelector(".ps-share-btn--popup")?.addEventListener("click", async () => {
                currentSheetPlace = placeData;
                await handleShareClick();
              });
            });
          }

          markerClusterGroup.addLayer(marker);
          map.setView([placeData.latitude, placeData.longitude], 14);

          if (isMobile()) {
            currentSheetPlace = placeData;
            placeSheetTitleEl.textContent = placeData.title;
            placeSheetSubtitleEl.textContent = placeData.category || "";
            placeSheetContent.innerHTML = buildPlaceBodyHtml(placeData);
            openPlaceSheet("half");
          } else {
            marker.openPopup();
          }
        } catch (e) {
          console.error("get_public failed:", e);
        }
        return;
      }

      // Place already in map — fly to it and open
      map.setView([placeData.latitude, placeData.longitude], 14);

      if (isMobile()) {
        currentSheetPlace = placeData;
        placeSheetTitleEl.textContent = placeData.title;
        placeSheetSubtitleEl.textContent = placeData.category || "";
        placeSheetContent.innerHTML = buildPlaceBodyHtml(placeData);
        openPlaceSheet("half");
      } else {
        // Find and open the marker's popup
        markerClusterGroup.eachLayer((layer) => {
          if (layer instanceof L.Marker) {
            const latlng = layer.getLatLng();
            if (Math.abs(latlng.lat - placeData.latitude) < 0.0001 &&
                Math.abs(latlng.lng - placeData.longitude) < 0.0001) {
              layer.openPopup();
            }
          }
        });
      }
    }

    async function loadPlacesAndOpenShared() {
      const params = new URLSearchParams(window.location.search);
      const sharedPlaceId = params.get("place");

      if (sharedPlaceId && !currentUserId) {
        // Guest opening a share link — skip loadPlaces (requires auth) and go straight
        // to get_public which uses the service role and needs no registration.
        await openPlaceById(sharedPlaceId);
        showGuestBanner();
        return;
      }

      await loadPlaces();
      if (sharedPlaceId) {
        await openPlaceById(sharedPlaceId);
      }
    }

    function showGuestBanner() {
      if (document.getElementById("guestBanner")) return;
      const banner = document.createElement("div");
      banner.id = "guestBanner";
      banner.className = "guest-banner";
      banner.innerHTML = `
        <span>You're viewing a shared Wonder.</span>
        <a href="index.html" class="guest-banner-cta">Join Five Wonders →</a>
        <button class="guest-banner-close" aria-label="Dismiss">×</button>
      `;
      banner.querySelector(".guest-banner-close").addEventListener("click", () => banner.remove());
      document.body.appendChild(banner);
    }

    loadPlacesAndOpenShared();

    // ===== User Location =====
    let userLocationMarker = null;

    function createUserLocationIcon() {
      return L.divIcon({
        className: "",
        html: '<div class="user-location-marker"></div>',
        iconSize: [22, 22],
        iconAnchor: [11, 11],
      });
    }

    function showUserLocation(lat, lon) {
      if (userLocationMarker) {
        userLocationMarker.setLatLng([lat, lon]);
      } else {
        userLocationMarker = L.marker([lat, lon], {
          icon: createUserLocationIcon(),
          zIndexOffset: 1000, // Keep on top of other markers
        }).addTo(map);
        userLocationMarker.bindPopup("You are here");
      }
    }

    function centerOnUserLocation() {
      if (userLocationMarker) {
        const latlng = userLocationMarker.getLatLng();
        map.setView(latlng, 12); // Closer zoom when clicking button
      } else {
        requestUserLocation(true);
      }
    }

    function requestUserLocation(zoomToLocation = false) {
      if (!navigator.geolocation) {
        console.log("Geolocation not supported");
        waitingForGeolocation = false;
        // Fall back to showing all places
        if (placesLoaded && !hasZoomedToUser) {
          fitToAllPlaces();
        }
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          showUserLocation(lat, lon);
          waitingForGeolocation = false;

          // Zoom to user location on initial load (zoom 7 ≈ 500 miles view)
          if (!hasZoomedToUser || zoomToLocation) {
            map.setView([lat, lon], zoomToLocation ? 12 : 7);
            hasZoomedToUser = true;
          }
        },
        (error) => {
          console.log("Geolocation error:", error.message);
          waitingForGeolocation = false;
          // Fall back to showing all places
          if (placesLoaded && !hasZoomedToUser) {
            fitToAllPlaces();
          }
        },
        {
          enableHighAccuracy: true,
          timeout: 5000, // Reduced timeout for faster fallback
          maximumAge: 60000, // Cache location for 1 minute
        }
      );
    }

    // Add location button to map
    const locationBtn = document.createElement("button");
    locationBtn.className = "fw-location-btn";
    locationBtn.title = "Show my location";
    locationBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4m10-10h-4M6 12H2"/></svg>`;
    locationBtn.onclick = centerOnUserLocation;
    document.getElementById("map").appendChild(locationBtn);

    // Request location on page load
    requestUserLocation();

    // Mobile hamburger menu toggle
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const headerNav = document.getElementById('headerNav');

    if (hamburgerBtn && headerNav) {
      hamburgerBtn.addEventListener('click', () => {
        const isOpen = headerNav.classList.toggle('open');
        hamburgerBtn.classList.toggle('open', isOpen);
        hamburgerBtn.setAttribute('aria-expanded', isOpen);
      });

      // Close menu when clicking a link
      headerNav.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          headerNav.classList.remove('open');
          hamburgerBtn.classList.remove('open');
          hamburgerBtn.setAttribute('aria-expanded', 'false');
        });
      });

      // Close menu when clicking outside
      document.addEventListener('click', (e) => {
        if (!hamburgerBtn.contains(e.target) && !headerNav.contains(e.target)) {
          headerNav.classList.remove('open');
          hamburgerBtn.classList.remove('open');
          hamburgerBtn.setAttribute('aria-expanded', 'false');
        }
      });
    }

    // ===== Filter Event Handlers =====
    // Toggle filter panel visibility
    filterToggle?.addEventListener('click', () => {
      const isExpanded = filterChips.style.display !== 'none';
      filterChips.style.display = isExpanded ? 'none' : 'flex';
      filterToggle.setAttribute('aria-expanded', !isExpanded);
    });

    // Handle filter chip clicks
    chipButtons.forEach(chip => {
      chip.addEventListener('click', () => {
        toggleFilter(chip.dataset.filter);
      });
    });

    // Handle clear all filters
    clearFiltersBtn?.addEventListener('click', clearAllFilters);

    // Initialize filter UI on page load (for URL params)
    if (activeFilters.size > 0) {
      filterChips.style.display = 'flex';
      filterToggle?.setAttribute('aria-expanded', 'true');
      updateFilterUI();
    }
  </script>
</body>
</html>
